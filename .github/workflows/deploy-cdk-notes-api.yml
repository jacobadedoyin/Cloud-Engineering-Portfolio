name: Deploy CDK Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'Projects/aws-cloud-engineering/aws-secure-serverless-application/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  WORKING_DIR: Projects/aws-cloud-engineering/aws-secure-serverless-application/infrastructure/cdk

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::821465444982:role/github-actions-cdk-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: pytest tests/

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: CDK synth
        working-directory: ${{ env.WORKING_DIR }}
        run: cdk synth

      - name: Deploy CDK stack
        working-directory: ${{ env.WORKING_DIR }}
        run: cdk deploy --require-approval never