name: Deploy Bicep Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Preview changes
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if --resource-group rg-cloud-portfolio --template-file Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/main.bicep --parameters Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/environments/${{ github.event.inputs.environment || 'dev' }}/parameters.json

      - name: Deploy Bicep modules
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create --resource-group rg-cloud-portfolio --template-file Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/main.bicep --parameters Projects/azure-cloud-engineering/infrastructure-as-code-and-cloud-governance/bicep/environments/${{ github.event.inputs.environment || 'dev' }}/parameters.json
